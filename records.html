<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบบันทึก - Smart MIP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar" class="sidebar-wrapper"></div>

<div class="content-wrapper">
  <h4 class="mb-4 text-secondary fw-bold"><i class="bi bi-journal-text text-secondary me-2"></i> ศูนย์รวมแบบบันทึกต่างๆ <small class="text-muted fw-normal fs-6">ตาม Clinical Pathway</small></h4>
  
  <div class="row">
    <div class="col-md-6 mb-3">
      <div class="card h-100 shadow-sm border-0 border-start border-danger border-4">
        <div class="card-body">
          <h5 class="card-title fw-bold text-danger"><i class="bi bi-exclamation-octagon me-2"></i> กลุ่มอุบัติการณ์ (Incidents)</h5>
          <div class="list-group list-group-flush mt-3">
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบบันทึกอุบัติการณ์ กลุ่ม SAVE</button>
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบบันทึกเหตุการณ์ไม่พึงประสงค์จากยา</button>
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบบันทึกการส่งต่อภาวะแทรกซ้อนทางกาย</button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-md-6 mb-3">
      <div class="card h-100 shadow-sm border-0 border-start border-info border-4">
        <div class="card-body">
          <h5 class="card-title fw-bold text-info"><i class="bi bi-bezier2 me-2"></i> กลุ่มติดตามและฟื้นฟู (Follow-up)</h5>
          <div class="list-group list-group-flush mt-3">
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบบันทึกการติดตามในระบบ บสต.</button>
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบบันทึกผลตรวจปัสสาวะ (หาสารเสพติด)</button>
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบบันทึกการกลับไปประกอบอาชีพ</button>
            <button class="list-group-item list-group-item-action"><i class="bi bi-chevron-right me-2 text-muted"></i> แบบประเมินความรู้ญาติ (D-METHOD)</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
