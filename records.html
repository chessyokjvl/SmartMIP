<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบบันทึกทางคลินิก - Smart MIP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar" class="sidebar-wrapper"></div>

<div class="content-wrapper">
  <h4 class="mb-4 text-secondary fw-bold"><i class="bi bi-journal-check text-primary me-2"></i> ศูนย์รวมแบบบันทึกทางคลินิก</h4>
  
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white border-bottom-0 pt-3 pb-0 overflow-auto">
      <ul class="nav nav-tabs flex-nowrap" id="recordTabs" role="tablist" style="white-space: nowrap;">
        <li class="nav-item"><button class="nav-link active fw-bold text-dark" data-bs-toggle="tab" data-bs-target="#tabStatus"><i class="bi bi-arrow-left-right"></i> ย้ายตึก/จำหน่าย</button></li>
        <li class="nav-item"><button class="nav-link fw-bold text-danger" data-bs-toggle="tab" data-bs-target="#tab1">อุบัติการณ์</button></li>
        <li class="nav-item"><button class="nav-link fw-bold text-success" data-bs-toggle="tab" data-bs-target="#tab7">D-METHOD</button></li>
        <li class="nav-item"><button class="nav-link fw-bold text-info" data-bs-toggle="tab" data-bs-target="#tab4">บสต. (Phase 4)</button></li>
        <li class="nav-item"><button class="nav-link fw-bold text-primary" data-bs-toggle="tab" data-bs-target="#tab6">Recovery (Phase 5)</button></li>
        <li class="nav-item"><button class="nav-link fw-bold text-secondary" data-bs-toggle="tab" data-bs-target="#tabOther">Med Error</button></li>
      </ul>
    </div>
    
    <div class="card-body p-4 bg-light">
      <div class="tab-content" id="recordTabsContent">
        
        <div class="tab-pane fade show active" id="tabStatus">
          <h5 class="fw-bold text-dark mb-3"><i class="bi bi-arrow-left-right"></i> จัดการสถานะผู้ป่วย (ย้ายหอผู้ป่วย / จำหน่ายกลับบ้าน)</h5>
          <div class="row">
            <div class="col-md-6 mb-3"><label class="fw-bold text-muted small">HN ผู้ป่วย</label>
              <input type="text" id="status_hn" class="form-control" placeholder="ระบุ HN">
            </div>
            <div class="col-md-6 mb-3"><label class="fw-bold text-muted small">การดำเนินการ</label>
              <select class="form-select" id="status_action" onchange="toggleStatusFields()">
                <option value="transfer">ย้ายหอผู้ป่วย (Transfer)</option>
                <option value="discharge">จำหน่ายผู้ป่วย (Discharge)</option>
              </select>
            </div>
            
            <div class="col-md-6 mb-3 transfer-field"><label class="fw-bold text-muted small">วันที่ย้ายตึก</label>
              <input type="date" id="transfer_date" class="form-control">
            </div>
            <div class="col-md-6 mb-3 transfer-field"><label class="fw-bold text-muted small">ย้ายไปยังหอผู้ป่วย</label>
              <select class="form-select" id="transfer_ward">
                <option value="พุทธรักษา (ชาย1)">พุทธรักษา (ชาย1)</option>
                <option value="จำปาทอง (ชาย2)">จำปาทอง (ชาย2)</option>
                <option value="ราชาวดี (ชาย3)">ราชาวดี (ชาย3)</option>
                <option value="ลีลาวดี (หญิง)">ลีลาวดี (หญิง)</option>
                <option value="ฉัตรชบา (พิเศษ)">ฉัตรชบา (พิเศษ)</option>
              </select>
            </div>

            <div class="col-md-6 mb-3 discharge-field" style="display:none;"><label class="fw-bold text-muted small">วันที่จำหน่าย</label>
              <input type="date" id="dc_date" class="form-control">
            </div>
            <div class="col-md-6 mb-3 discharge-field" style="display:none;"><label class="fw-bold text-muted small">ประเภทการจำหน่าย</label>
              <select class="form-select" id="dc_type">
                <option value="Improved">กลับบ้าน (Improved)</option>
                <option value="Refer">ส่งต่อ (Refer)</option>
                <option value="Escape">หนีกลับ (Escape)</option>
              </select>
            </div>
          </div>
          <button class="btn btn-dark fw-bold px-4" id="btnSubmitStatus" onclick="submitStatus()"><i class="bi bi-save"></i> บันทึกสถานะ</button>
        </div>

        <div class="tab-pane fade" id="tab1"><h5 class="fw-bold text-danger mb-3">แบบบันทึกอุบัติการณ์ กลุ่ม SAVE</h5></div>
        </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('transfer_date').valueAsDate = new Date();
    document.getElementById('dc_date').valueAsDate = new Date();
  });

  function toggleStatusFields() {
    const action = document.getElementById('status_action').value;
    const transferFields = document.querySelectorAll('.transfer-field');
    const dcFields = document.querySelectorAll('.discharge-field');

    if (action === 'discharge') {
      transferFields.forEach(el => el.style.display = 'none');
      dcFields.forEach(el => el.style.display = 'block');
    } else {
      transferFields.forEach(el => el.style.display = 'block');
      dcFields.forEach(el => el.style.display = 'none');
    }
  }

  async function submitStatus() {
    const hn = document.getElementById('status_hn').value;
    const action = document.getElementById('status_action').value;
    const staffName = sessionStorage.getItem('userName') || 'ไม่ระบุชื่อ';
    
    if(!hn) { alert("กรุณาระบุ HN ผู้ป่วย"); return; }
    
    const btn = document.getElementById('btnSubmitStatus');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

    let payload = {};
    let apiAction = '';

    if (action === 'transfer') {
      apiAction = 'transferWard';
      payload = { hn: hn, transferDate: document.getElementById('transfer_date').value, newWard: document.getElementById('transfer_ward').value, staffName: staffName };
    } else {
      apiAction = 'dischargePatient';
      payload = { hn: hn, dischargeDate: document.getElementById('dc_date').value, dischargeType: document.getElementById('dc_type').value, staffName: staffName };
    }

    const res = await callAPI(apiAction, payload);
    alert(res.message || "บันทึกสำเร็จ");
    if(res.success){ document.getElementById('status_hn').value = ''; }
    
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-save"></i> บันทึกสถานะ';
  }
</script>
</body>
</html>
