<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS - Smart MIP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar" class="sidebar-wrapper"></div>

<div class="content-wrapper">
  <h4 class="mb-3 text-secondary fw-bold"><i class="bi bi-thermometer-half text-primary me-2"></i> แบบประเมินอาการถอนแอมเฟตามีน (AWS) [cite: 38, 70]</h4>
  <div class="card shadow-sm border-0 border-top border-primary border-3 mb-4">
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-6 mb-2"><label class="fw-bold text-muted small">HN ผู้ป่วย</label><input type="text" id="aws_hn" class="form-control"></div>
        <div class="col-md-6 mb-2"><label class="fw-bold text-muted small">ชื่อผู้ประเมิน</label><input type="text" id="aws_staff" class="form-control" readonly></div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
          <thead class="table-light"><tr><th width="30%">รายการ</th><th>ระดับอาการ (คะแนน)</th></tr></thead>
          <tbody>
            <tr><td class="fw-bold">1. อุณหภูมิ</td><td><select class="form-select aws-item" id="aws_temp" onchange="calculateAWS()"><option value="0">0: < 37.0 C</option><option value="1">1: 37.1 - 37.5 C</option><option value="2">2: 37.6 - 38.0 C</option><option value="3">3: 38.1 - 38.5 C</option><option value="4">4: > 38.5 C</option></select></td></tr>
            <tr><td class="fw-bold">2. การรับรู้</td><td><select class="form-select aws-item" id="aws_orientation" onchange="calculateAWS()"><option value="0">0: ปกติ</option><option value="1">1: รู้เวลาไม่แน่นอน</option><option value="2">2: ไม่รู้เวลา/สถานที่</option><option value="3">3: ไม่รู้เวลา/สถานที่/บุคคล</option><option value="4">4: ไม่รับรู้อะไรเลย</option></select></td></tr>
            <tr><td class="fw-bold">3. วิตกกังวล</td><td><select class="form-select aws-item" id="aws_anxiety" onchange="calculateAWS()"><option value="0">0: อาการสงบ</option><option value="1">1: กังวลเล็กน้อย</option><option value="2">2: กังวลในอนาคต</option><option value="3">3: หวาดกลัว</option><option value="4">4: เคลื่อนไหวตลอดเวลา</option></select></td></tr>
            <tr><td class="fw-bold">4. อาการวุ่นวาย</td><td><select class="form-select aws-item" id="aws_agitation" onchange="calculateAWS()"><option value="0">0: พักผ่อนได้</option><option value="1">1: ไม่อยู่นิ่ง</option><option value="2">2: กระสับกระส่าย</option><option value="3">3: ผุดลุกผุดนั่ง</option><option value="4">4: เคลื่อนไหวตลอดเวลา</option></select></td></tr>
            <tr><td class="fw-bold">5. ประสาทหลอน</td><td><select class="form-select aws-item" id="aws_hallucination" onchange="calculateAWS()"><option value="0">0: ไม่มี</option><option value="1">1: หูแว่วเล็กน้อย</option><option value="2">2: หูแว่วเป็นบางเวลา</option><option value="3">3: หูแว่วตลอดเวลา</option><option value="4">4: ไม่อยู่ในโลกความจริง</option></select></td></tr>
            <tr><td class="fw-bold">6. ซึมเศร้า</td><td><select class="form-select aws-item" id="aws_depression" onchange="calculateAWS()"><option value="0">0: ไม่พบ</option><option value="1">1: สีหน้าเรียบเฉย/แยกตัว</option><option value="2">2: ต้องกระตุ้นจึงตอบได้</option><option value="3">3: กระตุ้นไม่ตอบ</option><option value="4">4: ทำร้ายตนเอง/มีแนวโน้มฆ่าตัวตาย</option></select></td></tr>
            <tr><td class="fw-bold">7. ก้าวร้าว</td><td><select class="form-select aws-item" id="aws_aggression" onchange="calculateAWS()"><option value="0">0: ไม่พบ</option><option value="1">1: สีหน้าไม่เป็นมิตร</option><option value="2">2: ต่อต้านบำบัด</option><option value="3">3: เอะอะโวยวาย</option><option value="4">4: ทำร้ายผู้อื่น/ข่มขู่</option></select></td></tr>
          </tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center mt-3 p-3 bg-light rounded">
        <h5 class="mb-0">คะแนนรวม: <span id="aws_total_display" class="text-primary fw-bold fs-4 ms-2">0</span> <span id="aws_interpret_display" class="badge bg-success ms-2 fs-6">Normal</span></h5>
        <button class="btn btn-primary px-4" onclick="submitAWS()" id="btnSubmitAWS"><i class="bi bi-save me-1"></i> บันทึกข้อมูล</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      const staffName = sessionStorage.getItem('userName');
      if(staffName) document.getElementById('aws_staff').value = staffName;
    }, 500);
  });

  function calculateAWS() {
    let total = 0;
    document.querySelectorAll('.aws-item').forEach(sel => total += parseInt(sel.value));
    document.getElementById('aws_total_display').innerText = total;
    
    let badge = document.getElementById('aws_interpret_display');
    if(total==0){ badge.className='badge bg-success ms-2 fs-6'; badge.innerText='Normal'; }
    else if(total<=13){ badge.className='badge bg-warning text-dark ms-2 fs-6'; badge.innerText='Mild (1-13)'; }
    else if(total<=20){ badge.className='badge text-white ms-2 fs-6'; badge.style.backgroundColor='#fd7e14'; badge.innerText='Moderate (14-20)'; }
    else { badge.className='badge bg-danger ms-2 fs-6'; badge.style.backgroundColor=''; badge.innerText='Severe (>20)'; }
  }

  async function submitAWS() {
    const hn = document.getElementById('aws_hn').value;
    const staff = document.getElementById('aws_staff').value;
    if(!hn) { alert("กรุณาระบุ HN ผู้ป่วย"); return; }
    
    const btn = document.getElementById('btnSubmitAWS');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

    const payload = {
      hn: hn, staffName: staff,
      items: {
        temp: document.getElementById('aws_temp').value, orientation: document.getElementById('aws_orientation').value,
        anxiety: document.getElementById('aws_anxiety').value, agitation: document.getElementById('aws_agitation').value,
        hallucination: document.getElementById('aws_hallucination').value, depression: document.getElementById('aws_depression').value,
        aggression: document.getElementById('aws_aggression').value
      },
      totalScore: parseInt(document.getElementById('aws_total_display').innerText)
    };

    const res = await callAPI('saveAWS', payload);
    alert(res.message || "เกิดข้อผิดพลาด");
    if(res.success){ document.querySelectorAll('.aws-item').forEach(s => s.value="0"); document.getElementById('aws_hn').value=''; calculateAWS(); }
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-save me-1"></i> บันทึกข้อมูล';
  }
</script>
</body>
</html>
