<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการผู้ใช้งาน - Smart MIP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar" class="sidebar-wrapper"></div>

<div class="content-wrapper">
  <h4 class="mb-3 text-secondary fw-bold"><i class="bi bi-people-fill text-danger me-2"></i> จัดการผู้ใช้งาน (User Management)</h4>
  
  <div class="card shadow-sm border-0 border-top border-danger border-3">
    <div class="card-body">
      <div class="alert alert-danger mb-4 border-0 shadow-sm"><i class="bi bi-shield-lock-fill me-2"></i> พื้นที่นี้เฉพาะ <strong>God Admin</strong> เท่านั้น</div>
      
      <button class="btn btn-danger mb-3 fw-bold"><i class="bi bi-person-plus-fill me-1"></i> เพิ่มผู้ใช้งานใหม่</button>
      
      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
          <thead class="bg-light">
            <tr><th>Username</th><th>ชื่อ-สกุล</th><th>สิทธิ์การใช้งาน (Role)</th><th>การจัดการ</th></tr>
          </thead>
          <tbody>
            <tr><td>admin</td><td>คุณพิชญ์พงศ์ คงนาวัง</td><td><span class="badge bg-danger">GodAdmin</span></td><td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i> แก้ไข</button></td></tr>
            <tr><td>nurse1</td><td>พยาบาลวิชาชีพ ก.</td><td><span class="badge bg-primary">General</span></td><td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i> แก้ไข</button></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // โค้ดส่วนนี้จะทำงานหลังจาก app.js เช็คสิทธิ์พื้นฐานเสร็จแล้ว
    setTimeout(() => {
      if(sessionStorage.getItem('userRole') !== 'GodAdmin') {
        alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้ ระบบจะพากลับไปหน้า Dashboard');
        window.location.href = 'dashboard.html';
      }
    }, 100);
  });
</script>
</body>
</html>
