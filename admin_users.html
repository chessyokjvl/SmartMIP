<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการผู้ใช้งาน - God Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #ecf0f5; overflow-x: hidden; }
    .content-wrapper { margin-left: 250px; padding: 20px; margin-top: 56px; min-height: calc(100vh - 56px); }
    @media (max-width: 768px) { .content-wrapper { margin-left: 0; } }
  </style>
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar"></div>

<div class="content-wrapper">
  <h4 class="mb-3 text-secondary fw-bold"><i class="bi bi-people-fill text-danger me-2"></i> จัดการผู้ใช้งาน (User Management)</h4>
  
  <div class="card shadow-sm border-0 border-top border-danger border-3">
    <div class="card-body">
      <div class="alert alert-danger mb-4"><i class="bi bi-shield-lock-fill"></i> พื้นที่นี้เฉพาะ <strong>God Admin</strong> เท่านั้น</div>
      
      <button class="btn btn-danger mb-3"><i class="bi bi-person-plus-fill"></i> เพิ่มผู้ใช้งานใหม่</button>
      
      <table class="table table-bordered">
        <thead class="bg-light">
          <tr><th>Username</th><th>ชื่อ-สกุล</th><th>สิทธิ์การใช้งาน (Role)</th><th>การจัดการ</th></tr>
        </thead>
        <tbody>
          <tr><td>admin</td><td>คุณพิชญ์พงศ์ คงนาวัง</td><td><span class="badge bg-danger">GodAdmin</span></td><td><button class="btn btn-sm btn-warning">แก้ไข</button></td></tr>
          <tr><td>nurse1</td><td>พยาบาลวิชาชีพ ก.</td><td><span class="badge bg-primary">General</span></td><td><button class="btn btn-sm btn-warning">แก้ไข</button></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // ตรวจสอบสิทธิ์ว่าใช่ GodAdmin หรือไม่ ถ้าไม่ใช่เตะออก
  document.addEventListener("DOMContentLoaded", () => {
    if(sessionStorage.getItem('userRole') !== 'GodAdmin') {
      alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้');
      window.location.href = 'dashboard.html';
    }
  });
</script>
</body>
</html>
