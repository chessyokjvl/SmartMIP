<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAVE - Smart MIP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar" class="sidebar-wrapper"></div>

<div class="content-wrapper">
  <h4 class="mb-3 text-secondary fw-bold"><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i> แบบประเมินความเสี่ยงคลินิก (SAVE)</h4>
  <div class="card shadow-sm border-0 border-top border-danger border-3 mb-4">
    <div class="card-body">
      
      <div class="row mb-3">
        <div class="col-md-6 mb-2">
          <label class="fw-bold text-muted small">HN ผู้ป่วย</label>
          <input type="text" id="save_hn" class="form-control fw-bold text-danger" placeholder="ระบุ HN">
        </div>
        <div class="col-md-6 mb-2">
          <label class="fw-bold text-muted small">ชื่อผู้ประเมิน</label>
          <input type="text" id="save_staff" class="form-control bg-light" readonly>
        </div>
      </div>

      <div class="alert alert-light border shadow-sm sticky-top" style="top: 65px; z-index: 1000;">
        <div class="d-flex flex-wrap justify-content-between text-center fw-bold fs-6">
          <div class="p-2">S: <span id="badge_s" class="badge bg-success">ต่ำ (0)</span></div>
          <div class="p-2">A: <span id="badge_a" class="badge bg-success">ต่ำ (0)</span></div>
          <div class="p-2">V: <span id="badge_v" class="badge bg-success">ต่ำ (0)</span></div>
          <div class="p-2">E: <span id="badge_e" class="badge bg-success">ต่ำ (0)</span></div>
        </div>
      </div>

      <div class="card mb-3 border-secondary"><div class="card-header bg-secondary text-white fw-bold">S : Suicide (แบบประเมินฆ่าตัวตาย)</div><div class="card-body">
        <div class="form-check"><input class="form-check-input save-chk" type="checkbox" value="s_1" data-cat="S" data-star="true" onchange="calculateSAVE()"><label class="form-check-label">มีอาการหูแว่ว สั่งให้ทำร้ายตนเอง <span class="text-danger fw-bold">*</span></label></div>
        <div class="form-check"><input class="form-check-input save-chk" type="checkbox" value="s_2" data-cat="S" onchange="calculateSAVE()"><label class="form-check-label">ซึมเศร้า ท้อแท้</label></div>
      </div></div>
      
      <div class="card mb-3 border-danger"><div class="card-header bg-danger text-white fw-bold">V : Violence (พฤติกรรมรุนแรง)</div><div class="card-body">
        <div class="form-check"><input class="form-check-input save-chk" type="checkbox" value="v_1" data-cat="V" data-star="true" onchange="calculateSAVE()"><label class="form-check-label">ทำร้ายตนเองรุนแรง <span class="text-danger fw-bold">*</span></label></div>
        <div class="form-check"><input class="form-check-input save-chk" type="checkbox" value="v_2" data-cat="V" onchange="calculateSAVE()"><label class="form-check-label">หวาดกลัว หวาดระแวง</label></div>
      </div></div>

      <div class="text-end mt-4">
        <button class="btn btn-danger px-4 btn-lg fw-bold" onclick="submitSAVE()" id="btnSubmitSAVE"><i class="bi bi-save me-1"></i> บันทึกผล SAVE</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // ==========================================
  // ระบบ Auto-fill
  // ==========================================
  document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      const staffName = sessionStorage.getItem('userName');
      if(staffName) document.getElementById('save_staff').value = staffName;

      const activeHN = sessionStorage.getItem('activeHN');
      const hnInput = document.getElementById('save_hn');
      if (activeHN) {
        hnInput.value = activeHN;
        hnInput.readOnly = true; 
        hnInput.classList.add('bg-light');
      }
    }, 300);
  });

  let saveResult = { S:{score:0,level:'ต่ำ'}, A:{score:0,level:'ต่ำ'}, V:{score:0,level:'ต่ำ'}, E:{score:0,level:'ต่ำ'}, checkedItems:[], totalScore:0 };

  function calculateSAVE() {
    let scores = { S:0, A:0, V:0, E:0 }, stars = { S:false, A:false, V:false, E:false };
    saveResult.checkedItems = [];

    document.querySelectorAll('.save-chk').forEach(chk => {
      if (chk.checked) {
        let cat = chk.getAttribute('data-cat');
        scores[cat] += 1;
        if (chk.getAttribute('data-star') === 'true') stars[cat] = true;
        saveResult.checkedItems.push(chk.value);
      }
    });

    saveResult.totalScore = scores.S + scores.A + scores.V + scores.E;

    saveResult.S.score = scores.S; saveResult.S.level = stars.S ? 'สูง (Star)' : (scores.S >= 7 ? 'สูง' : (scores.S >= 4 ? 'ปานกลาง' : 'ต่ำ'));
    saveResult.A.score = scores.A; saveResult.A.level = stars.A ? 'สูง (Star)' : (scores.A >= 7 ? 'สูง' : (scores.A >= 4 ? 'ปานกลาง' : 'ต่ำ'));
    saveResult.V.score = scores.V; saveResult.V.level = stars.V ? 'สูง (Star)' : (scores.V >= 9 ? 'สูง' : (scores.V >= 5 ? 'ปานกลาง' : 'ต่ำ'));
    saveResult.E.score = scores.E; saveResult.E.level = stars.E ? 'สูง (Star)' : (scores.E >= 6 ? 'สูง' : (scores.E >= 3 ? 'ปานกลาง' : 'ต่ำ'));

    document.getElementById('badge_s').innerText = `${saveResult.S.level} (${saveResult.S.score})`;
    document.getElementById('badge_v').innerText = `${saveResult.V.level} (${saveResult.V.score})`;
  }

  async function submitSAVE() {
    const hn = document.getElementById('save_hn').value;
    const staff = document.getElementById('save_staff').value;
    if(!hn) { alert("กรุณาระบุ HN ผู้ป่วย"); return; }
    
    const btn = document.getElementById('btnSubmitSAVE');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

    const payload = { hn: hn, staffName: staff, S: saveResult.S, A: saveResult.A, V: saveResult.V, E: saveResult.E, checkedItems: saveResult.checkedItems, totalScore: saveResult.totalScore };

    const res = await callAPI('saveSAVE', payload);
    alert(res.message || "เกิดข้อผิดพลาด");
    
    if(res.success){ 
      if(sessionStorage.getItem('activeHN')) window.location.href = 'patients.html'; // เด้งกลับ
    }
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-save me-1"></i> บันทึกผล SAVE';
  }
</script>
</body>
</html>
