<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการโครงสร้าง - Smart MIP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="app-header"></div>
<div id="app-sidebar" class="sidebar-wrapper"></div>

<div class="content-wrapper">
  <h4 class="mb-3 text-secondary fw-bold"><i class="bi bi-diagram-3 text-secondary me-2"></i> จัดการโครงสร้างระบบ (System Structure)</h4>
  
  <div class="card shadow-sm border-0 border-top border-secondary border-3">
    <div class="card-body">
      <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
        <li class="nav-item" role="presentation"><button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#ward">จัดการหอผู้ป่วย (Ward)</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link fw-bold" data-bs-toggle="tab" data-bs-target="#config">ตั้งค่าเกณฑ์ Alert</button></li>
      </ul>
      <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="ward">
          <button class="btn btn-secondary btn-sm mb-3"><i class="bi bi-plus"></i> เพิ่มหอผู้ป่วย</button>
          <table class="table table-bordered align-middle">
            <thead class="bg-light"><tr><th>รหัสตึก</th><th>ชื่อหอผู้ป่วย</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
            <tbody>
              <tr><td>W01</td><td>หอผู้ป่วยจิตเวชชาย 1</td><td><span class="badge bg-success">เปิดใช้งาน</span></td><td><button class="btn btn-sm btn-outline-secondary">แก้ไข</button></td></tr>
              <tr><td>W02</td><td>หอผู้ป่วยจิตเวชหญิง 1</td><td><span class="badge bg-success">เปิดใช้งาน</span></td><td><button class="btn btn-sm btn-outline-secondary">แก้ไข</button></td></tr>
            </tbody>
          </table>
        </div>
        <div class="tab-pane fade" id="config">
          <div class="alert alert-warning"><i class="bi bi-cone-striped me-2"></i> ส่วนปรับแต่งค่าตัวแปรสำหรับระบบ Decision Support System (กำลังพัฒนา)</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      if(!['Admin', 'GodAdmin'].includes(sessionStorage.getItem('userRole'))) {
        alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้'); window.location.href = 'dashboard.html';
      }
    }, 100);
  });
</script>
</body>
</html>
