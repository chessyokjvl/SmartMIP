<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart MIP Care</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid #3c8dbc; }
  </style>
</head>
<body>

<div class="login-box text-center">
  <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="Logo" style="max-width: 100px; margin-bottom: 15px;">
  <h4 class="fw-bold text-dark mb-0">โรงพยาบาลจิตเวชเลยราชนครินทร์</h4>
  <p class="text-primary fw-bold mb-4">Smart MIP Care System</p>
  
  <div class="mb-3 text-start">
    <label class="form-label text-secondary fw-bold small">Username</label>
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
      <input type="text" class="form-control border-start-0 ps-0" id="loginUser" placeholder="กรอกชื่อผู้ใช้" autofocus>
    </div>
  </div>
  <div class="mb-4 text-start">
    <label class="form-label text-secondary fw-bold small">Password</label>
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="bi bi-key text-muted"></i></span>
      <input type="password" class="form-control border-start-0 ps-0" id="loginPass" placeholder="กรอกรหัสผ่าน">
    </div>
  </div>
  <button type="button" class="btn btn-primary w-100 py-2 fw-bold mb-3" style="background-color: #3c8dbc; border:none;" onclick="handleLogin()" id="btnLogin">เข้าสู่ระบบ</button>
  <a href="#" class="text-decoration-none text-muted small" onclick="handleGuest()"><i class="bi bi-eye"></i> เข้าสู่ระบบในฐานะ Guest View</a>
</div>

<script src="app.js"></script>
<script>
  document.getElementById("loginPass").addEventListener("keyup", function(e) { if (e.key === "Enter") handleLogin(); });

  async function handleLogin() {
    const btn = document.getElementById('btnLogin');
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังเข้าสู่ระบบ...';
    
    const res = await callAPI('login', { username: user, password: pass });
    processLogin(res, btn);
  }

  async function handleGuest() {
    const res = await callAPI('login', { username: '', password: '' });
    processLogin(res, document.getElementById('btnLogin'));
  }

  function processLogin(response, btn) {
    btn.disabled = false; btn.innerText = "เข้าสู่ระบบ";
    if(response && response.success) {
      sessionStorage.setItem('userRole', response.role);
      sessionStorage.setItem('userName', response.name);
      window.location.href = 'dashboard.html'; // ล็อกอินสำเร็จ ย้ายไปหน้า Dashboard
    } else {
      alert(response.message || 'รหัสผ่านไม่ถูกต้อง');
    }
  }
</script>
</body>
</html>
